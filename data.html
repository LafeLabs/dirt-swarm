<html lang="en">
<head>

   <title>data.md</title>    
</head>
<body>    
    <a href = "index.html">index.html</a> 
    <h1>data.md</h1>
    <pre id = "markdown"></pre>
<style>
</style>
<script>

dataFiles = [];

var httpc = new XMLHttpRequest();
httpc.onreadystatechange = function() {
    if (this.readyState == 4 && this.status == 200) {
        dataFiles = JSON.parse(this.responseText);
        dataMarkdown = "# data.md\n\n";        
        for(var index = 0;index < dataFiles.length; index++){
            dataMarkdown += " - [data/" + dataFiles[index] + "](data/" + dataFiles[index] +  ")\n";     
        }
        document.getElementById("markdown").innerHTML = dataMarkdown;
        
        var httpcd = new XMLHttpRequest();
        httpcd.open("POST", "save-file.php", true);
        httpcd.setRequestHeader("Content-Type", "application/x-www-form-urlencoded;charset=utf-8");
        httpcd.send("data=" + dataMarkdown + "&filename=data.md");//send text to save-file.php

    }
};
httpc.open("GET", "list-files.php?directoryname=data", true);
httpc.send();


</script>
</body>
</html>
