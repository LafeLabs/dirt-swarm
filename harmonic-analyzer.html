<!doctype html>
<html lang="en">
<head>
   <meta charset="utf-8">
<link href="data:image/x-icon;base64,AAABAAEAEBAQAAEABAAoAQAAFgAAACgAAAAQAAAAIAAAAAEABAAAAAAAgAAAAAAAAAAAAAAAEAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAD/9wAA7usAAFVRAAC7uwAA//cAAPrfAAD63wAA+t8AAPjfAAD7jwAA+98AAPvfAAD71wAA++8AAP//AAD//wAA" rel="icon" type="image/x-icon">   
   <title>harmonic-analyzer.html</title>    
   <script src="https://cdn.jsdelivr.net/npm/p5@1.7.0/lib/p5.js"></script>
</head>
<body> 
<div id = "control-scroll">
    <h1>CONTROL</h1>
    <main></main>
    <table id = "inputtable">
        <tr>
            <td>message:</td>
            <td>
                <input>
            </td>
        </tr>
    </table>

</div>
<div id = "data-scroll">
    <h1>DATA</h1>
    <h2>Live Plot</h2>
    <div style="display:none" id="status">Status: Idle</div>
    <img id ="live-trace">
    <div id = "save-trace-button">SAVE PLOT</div>
    <div id = "plot-feed"></div>
</div>
<script>


harmonicAnalyzer = {}

harmonicAnalyzer.mouse_x = 0.0;
harmonicAnalyzer.mouse_y = 0.0;
harmonicAnalyzer.mouse_z = 0;//mouse wheel or equivalent
harmonicAnalyzer.message = "medium";

let vnaImg = null;       // Will hold the processed p5.Image object
let isFetching = false;  // Your guard flag defined in the fetch function

function savejson(){
    var httpc = new XMLHttpRequest();
    httpc.open("POST", "save-file.php", true);
    httpc.setRequestHeader("Content-Type", "application/x-www-form-urlencoded");
    httpc.send("data="+encodeURIComponent(JSON.stringify(harmonicAnalyzer,null,"    "))+"&filename=harmonic-analyzer.json");//send text to save-file.php    
}

inputs = document.getElementById("inputtable").getElementsByTagName("INPUT");

var httpc = new XMLHttpRequest();
httpc.onreadystatechange = function() {
    if (this.readyState == 4 && this.status == 200) {
        harmonicAnalyzer = JSON.parse(this.responseText);
        inputs[0].value = harmonicAnalyzer.message;
        harmonicAnalyzer.mouse_x = 0.0;
        harmonicAnalyzer.mouse_y = 0.0;
        harmonicAnalyzer.mouse_z = 0;//mouse wheel or equivalent
    }
};
httpc.open("GET", "load-file.php?filename=harmonic-analyzer.json", true);
httpc.send();

function setup() {

    control_canvas_width = 0.48*innerWidth;
    createCanvas(control_canvas_width,0.5*control_canvas_width);  
    frameRate(10);
}

function draw(){
    background(255);
    fill(0);
    strokeWeight(1);
    stroke(0);
    textSize(25);
    text("mouse_x = " + harmonicAnalyzer.mouse_x.toString(),25,25);
    text("mouse_y = " + harmonicAnalyzer.mouse_y.toString(),25,25 + height/3);
    text("mouse_z = " + harmonicAnalyzer.mouse_z.toString(),25,25 + 2*height/3);

    if(mouseX >= 0 && mouseX <= width && mouseY >= 0 && mouseY <= height){
        harmonicAnalyzer.mouse_x = Math.round(1000*mouseX/width)/1000;
        harmonicAnalyzer.mouse_y = Math.round(1000*mouseY/height)/1000;
    }
    
    
    if (!isFetching) {
        fetchSingleFrame();
    }
    
}


inputs[0].onchange = function(){
    harmonicAnalyzer.message = this.value;
    savejson();
}


function mouseWheel(event) {
    if(mouseX >= 0 && mouseX <= width && mouseY >= 0 && mouseY <= height){
        if(event.delta > 0){ //mouse wheel down
            harmonicAnalyzer.mouse_z--;
        }
        else{
            harmonicAnalyzer.mouse_z++;
        }
    }
}

function fetchSingleFrame() {
    isFetching = true;
    const statusDiv = document.getElementById('status');
    const plotImg = document.getElementById('live-trace');
    
    statusDiv.innerText = "Status: Fetching latest data...";
    statusDiv.style.color = "#ffcc00"; 

    fetch('bridge.php', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(harmonicAnalyzer) 
    })
    .then(response => {
        if (!response.ok) throw new Error(`HTTP Error Status: ${response.status}`);
        return response.text(); 
    })
    .then(rawText => {
        const cleanText = rawText.trim();
        
        try {
            dataJSON = JSON.parse(cleanText);
            if (dataJSON?.image?.startsWith('data:image/png;base64,')) {
                plotImg.src = dataJSON.image;
                plotImg.style.display = "block";
                statusDiv.innerText = "Status: Streaming Live...";
                statusDiv.style.color = "#00ff96";
            } else throw new Error("Missing or invalid image data");
        } catch { throw new Error("Bad or malformed JSON payload"); }
        
        
    })
    .catch(error => {
        console.error('Test pipeline error:', error);
        statusDiv.innerText = `Status: Failed (${error.message})`;
        statusDiv.style.color = "#ff3366"; 
    })
    .finally(() => {
        // Release the guard so the p5 loop knows it can request the next frame
        isFetching = false; 
    });
}

document.getElementById("save-trace-button").onclick = function(){
    png64 = document.getElementById('live-trace').src;
    var newimg = document.createElement("IMG");
    document.getElementById("plot-feed").prepend(newimg);
    newimg.src = png64;
    var timestamp = Math.round((new Date().getTime())/1000).toString();
    var httpc = new XMLHttpRequest();
    var url = "save-png.php";        
    httpc.open("POST", url, true);
    httpc.setRequestHeader("Content-Type", "application/x-www-form-urlencoded");
    httpc.send("data="+encodeURIComponent(png64.substring(22))+"&filename=plots/plot-" + timestamp +  ".png");//send text to filesaver.php
    //drawplots();
    
    saveData = {};
    saveData.xdata = dataJSON.xdata;
    saveData.ydata = dataJSON.ydata;
    saveData.timestamp = timestamp;
    saveData.harmonicAnalyzer = JSON.parse(JSON.stringify(harmonicAnalyzer));
    saveData.xlabel = dataJSON.xlabel;
    saveData.ylabel = dataJSON.ylabel;
    saveData.ymin = dataJSON.ymin;
    saveData.ymax = dataJSON.ymax;
    saveData.mouse_x = dataJSON.mouse_x;
    saveData.mouse_y = dataJSON.mouse_y;
    saveData.mouse_z = dataJSON.mouse_z;

    saveData.filename = "data/data-" + timestamp + ".json";
    saveData.plotname = "plots/plot-" + timestamp + ".png";
    saveData.origin = "live-web-instrument.html";
    var httpcj = new XMLHttpRequest();
    var url = "save-file.php";        
    httpcj.open("POST", url, true);
    httpcj.setRequestHeader("Content-Type", "application/x-www-form-urlencoded;charset=utf-8");
    httpcj.send("data=" + JSON.stringify(saveData) + "&filename=data/data-" + timestamp + ".json");//send text to save-file.php
    
}

drawplots();

function drawplots(){
    plotfiles = [];
    var httpcplots = new XMLHttpRequest();
    httpcplots.onreadystatechange = function() {
        if (this.readyState == 4 && this.status == 200) {
            plotfiles = JSON.parse(this.responseText);
            plots_md = "# plots.md\n\n";
            data_md = "# data.md\n\n";
            
            document.getElementById("plot-feed").innerHTML = "";
            for(var index = plotfiles.length - 1;index >= 0;index--){
                plots_md += "![](plots/" + plotfiles[index] + ")\n\n";
                data_md += " - [data/data." + plotfiles[index].split("-")[1].split('.')[0] + ".json](data/data-" + plotfiles[index].split("-")[1].split('.')[0] + ".json)\n";
                var newimg = document.createElement("IMG");
                newimg.src = "plots/" + plotfiles[index];
                document.getElementById("plot-feed").appendChild(newimg);
            }
            
            var httpcp = new XMLHttpRequest();
            httpcp.open("POST", "save-file.php", true);
            httpcp.setRequestHeader("Content-Type", "application/x-www-form-urlencoded;charset=utf-8");
            httpcp.send("data=" + plots_md + "&filename=plots.md");//send text to save-file.php

            var httpcd = new XMLHttpRequest();
            httpcd.open("POST", "save-file.php", true);
            httpcd.setRequestHeader("Content-Type", "application/x-www-form-urlencoded;charset=utf-8");
            httpcd.send("data=" + data_md + "&filename=data.md");//send text to save-file.php

        }
    };
    httpcplots.open("GET", "list-files.php?directoryname=plots", true);
    httpcplots.send();
}
</script>
